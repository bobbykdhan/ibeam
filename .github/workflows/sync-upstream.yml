name: Sync upstream (voyz/ibeam)

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/voyz/ibeam.git

      - name: Fetch upstream master
        run: git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Merge upstream into master
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/master --no-edit -m "chore: sync upstream voyz/ibeam@master"
          git push origin master

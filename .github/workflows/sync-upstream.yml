name: Sync upstream (voyz/ibeam)

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/voyz/ibeam.git

      - name: Fetch upstream master
        run: git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Merge upstream into master
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          if git merge upstream/master --no-edit -m "chore: sync upstream voyz/ibeam@master"; then
            git push origin master
            echo "result=merged" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR on conflict
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="upstream-sync/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" upstream/master
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync upstream voyz/ibeam (conflicts need resolution)" \
            --body "Automated upstream sync from [voyz/ibeam](https://github.com/voyz/ibeam) could not be merged automatically due to conflicts. Please resolve the conflicts and merge this PR." \
            --base master \
            --head "$BRANCH"
